<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDIKA SATRIA | ENGINEERING SHOWCASE</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@200;400;700;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --blue-brand: #0038FF;
    --dark-bg: #030303;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: none;
}

body {
    background: var(--dark-bg);
    color: white;
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x: hidden;
}

/* FONT */
.font-anton { font-family: 'Anton', sans-serif; }

/* BACKGROUND */
.bg-grain {
    position: fixed;
    inset: 0;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.1;
    pointer-events: none;
}

.ambient-light {
    position: fixed;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(0,56,255,0.08), transparent);
    top: -20%;
    right: -10%;
}

/* HERO */
.hero-container {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    align-items: center;
    padding: 0 6vw;
}

/* TITLE */
.hero-title {
    font-size: clamp(4rem, 11vw, 11rem);
    line-height: 0.8;
}

.text-outline {
    color: transparent;
    -webkit-text-stroke: 1.5px var(--blue-brand);
}

/* VERTICAL TEXT */
.vertical-text-container {
    position: absolute;
    right: -2vw;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    z-index: 5;
}

.vertical-text {
    font-family: 'Anton';
    font-size: clamp(2rem, 5vw, 6rem);
    color: transparent;
    -webkit-text-stroke: 1.5px var(--blue-brand);
    border: 2px solid var(--blue-brand);
    padding: 20px 40px;
    letter-spacing: 0.1em;
}

/* LANYARD CENTER */
.badge-wrapper {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 2000px;
}

/* CARD */
.id-card {
    width: 290px;
    height: 480px;
    background: white;
    color: black;
    padding: 24px;
    z-index: 20;
    transform-style: preserve-3d;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
}

.card-hole {
    width: 45px;
    height: 12px;
    background: black;
    border-radius: 20px;
    margin: 0 auto;
}

/* LANYARD */
#lanyard-svg {
    position: absolute;
    top: -300px;
    left: 50%;
    transform: translateX(-50%);
    width: 1000px;
}

.lanyard-strap {
    stroke: var(--blue-brand);
    stroke-width: 35;
    fill: none;
    opacity: 0.7;
}

/* PHOTO */
.photo-frame {
    width: 100%;
    aspect-ratio: 4/5;
    overflow: hidden;
    margin: 20px 0;
    position: relative;
}

.photo-base {
    width: 100%;
    height: 100%;
    filter: grayscale(1) brightness(0.4);
}

.photo-spotlight {
    position: absolute;
    width: 100%;
    height: 100%;
    clip-path: circle(0px at 50% 50%);
    transition: 0.1s;
}
</style>
</head>

<body>

<div class="bg-grain"></div>
<div class="ambient-light"></div>

<!-- VERTICAL TEXT -->
<div class="vertical-text-container">
    <div class="vertical-text">
        ELECTRONICS<br>ENGINEERING
    </div>
</div>

<!-- HERO -->
<section class="hero-container">

<!-- LEFT -->
<div>
    <p class="text-xs tracking-[0.5em] text-blue-600 mb-6">
        PROJECT SHOWCASE • 2023–2026
    </p>

    <h1 class="hero-title font-anton">
        DESIGN<br>
        <span class="text-outline">CASE</span><br>
        ARCHIVE
    </h1>

    <p class="mt-6 text-gray-400 max-w-md">
        Electronics Engineering student focusing on embedded systems,
        instrumentation, and industrial automation.
    </p>
</div>

<!-- RIGHT / LANYARD -->
<div class="badge-wrapper" id="dragArea">

<svg id="lanyard-svg" viewBox="0 0 1000 1200">
    <path id="strap-path" class="lanyard-strap"
        d="M150,0 L500,470 L850,0"/>
</svg>

<div class="id-card" id="card">
    <div class="card-hole"></div>

    <div class="photo-frame" id="photoFrame">
        <img src="dikas.jpg" class="photo-base">
        <img src="dikas.jpg" class="photo-spotlight" id="spotlight">
    </div>

    <h2 class="font-anton text-2xl">ANDIKA S.P</h2>
    <p class="text-xs text-blue-600">ELECTRONICS ENGINEER</p>
</div>

</div>

</section>

<script>
const card = document.getElementById("card");
const strap = document.getElementById("strap-path");

let x=0,y=0,vx=0,vy=0;
let dragging=false;

document.addEventListener("mousedown", ()=> dragging=true);
document.addEventListener("mouseup", ()=> dragging=false);

document.addEventListener("mousemove", (e)=>{
    if(dragging){
        x += e.movementX;
        y += e.movementY;
    }
});

function animate(){
    if(!dragging){
        vx += (-x*0.08);
        vy += (-y*0.08);
        vx *= 0.85;
        vy *= 0.85;
        x += vx;
        y += vy;
    }

    card.style.transform =
        `translate(${x}px,${y}px) rotateX(${y/15}deg) rotateY(${-x/15}deg)`;

    strap.setAttribute("d",
        `M150,0 L${500+x*0.1},${470+y*0.1} L850,0`
    );

    requestAnimationFrame(animate);
}
animate();

/* SPOTLIGHT */
const frame = document.getElementById("photoFrame");
const spot = document.getElementById("spotlight");

document.addEventListener("mousemove",(e)=>{
    const r = frame.getBoundingClientRect();

    if(e.clientX>r.left && e.clientX<r.right &&
       e.clientY>r.top && e.clientY<r.bottom){

        spot.style.clipPath =
        `circle(80px at ${e.clientX-r.left}px ${e.clientY-r.top}px)`;

    } else {
        spot.style.clipPath = "circle(0 at 50% 50%)";
    }
});
</script>

</body>
</html>
